<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Tests · Solaris Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Variables de tema ── */
    :root, [data-theme="dark"] {
      --bg:      #07090f; --surface: #0d1117; --surface2: #111820;
      --border:  #1e2a3a; --text: #e2e8f0;    --muted: #64748b;
      --green:   #22c55e; --red: #ef4444;      --yellow: #eab308;
      --blue:    #3b82f6; --accent: #f59e0b;
      --grid-color: rgba(59,130,246,.04);
      --err-bg: rgba(239,68,68,.06);  --err-border: rgba(239,68,68,.25);
      --ok-bg:  rgba(34,197,94,.06);  --ok-border:  rgba(34,197,94,.2);
      /* JSON syntax highlight — dark */
      --json-key:  #7dd3fc; --json-str: #86efac;
      --json-num:  #fbbf24; --json-bool: #c084fc; --json-null: #64748b;
    }
    [data-theme="light"] {
      --bg: #f1f5f9; --surface: #fff; --surface2: #f8fafc;
      --border: #cbd5e1; --text: #0f172a; --muted: #64748b;
      --green: #16a34a; --red: #dc2626; --yellow: #b45309;
      --blue: #2563eb;  --accent: #d97706;
      --grid-color: rgba(37,99,235,.05);
      --err-bg: rgba(220,38,38,.05);  --err-border: rgba(220,38,38,.2);
      --ok-bg:  rgba(22,163,74,.05);  --ok-border:  rgba(22,163,74,.2);
      /* JSON syntax highlight — light (high contrast on white) */
      --json-key:  #1e40af; --json-str: #166534;
      --json-num:  #92400e; --json-bool: #6b21a8; --json-null: #94a3b8;
    }

    /* ── Layout base ── */
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh; padding: 2rem;
      transition: background .35s, color .35s;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; opacity: .12; animation: drift 16s ease-in-out infinite alternate; }
    .orb-1 { width: 500px; height: 500px; background: #1d4ed8; top: -150px; right: -100px; }
    .orb-2 { width: 350px; height: 350px; background: #7c3aed; bottom: -100px; left: -80px; animation-delay: 6s; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(20px,-25px); } }

    .page {
      position: relative; z-index: 1;
      max-width: 1040px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 1.5rem;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 1rem;
      border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;
    }
    .back-btn {
      font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--muted);
      text-decoration: none; border: 1px solid var(--border);
      padding: .35rem .75rem; border-radius: 8px;
      transition: border-color .2s, color .2s;
    }
    .back-btn:hover { border-color: var(--blue); color: var(--blue); }
    .header-center h1 {
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-center p { font-family: 'JetBrains Mono', monospace; font-size: .68rem; color: var(--muted); margin-top: 2px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; }

    /* Theme toggle */
    .theme-switch { display: flex; align-items: center; gap: .4rem; user-select: none; }
    .toggle { position: relative; width: 38px; height: 20px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .track { position: absolute; inset: 0; border-radius: 999px; background: var(--border); transition: background .3s; }
    .toggle input:checked + .track { background: var(--blue); }
    .thumb { position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: transform .3s; }
    .toggle input:checked ~ .thumb { transform: translateX(18px); }

    /* ── Credenciales ── */
    .creds-bar {
      display: flex; gap: .75rem; align-items: flex-end;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.25rem;
    }
    .field { display: flex; flex-direction: column; gap: .35rem; flex: 1; }
    .field label {
      font-family: 'JetBrains Mono', monospace; font-size: .62rem;
      color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
    }
    .field input {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: .78rem;
      padding: .5rem .75rem; border-radius: 8px; outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--blue); }

    /* ── Token bar ── */
    .token-bar {
      display: flex; gap: .5rem; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: .65rem 1rem;
      font-family: 'JetBrains Mono', monospace; font-size: .65rem;
    }
    .token-label { color: var(--muted); white-space: nowrap; }
    .token-val   { color: var(--green); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .token-val.empty { color: var(--muted); font-style: italic; }

    /* ── Botones ── */
    .actions { display: flex; gap: .75rem; flex-wrap: wrap; }
    .btn {
      display: flex; align-items: center; gap: .45rem;
      font-family: 'JetBrains Mono', monospace; font-size: .72rem; font-weight: 500;
      padding: .55rem 1.1rem; border-radius: 9px; border: 1px solid;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-primary  { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn-primary:hover  { background: #2563eb; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-outline  { background: transparent; border-color: var(--border); color: var(--text); }
    .btn-outline:hover  { border-color: var(--blue); color: var(--blue); }
    .btn-outline:disabled { opacity: .35; cursor: not-allowed; }
    .btn-danger   { background: transparent; border-color: rgba(239,68,68,.4); color: var(--red); }
    .btn-danger:hover   { background: rgba(239,68,68,.1); }
    .btn-dl-fails { background: transparent; border-color: rgba(239,68,68,.4); color: var(--red); }
    .btn-dl-fails:hover  { background: rgba(239,68,68,.1); }
    .btn-dl-fails:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; height: 6px; display: none;
    }
    .progress-bar-wrap.visible { display: block; }
    .progress-bar { height: 100%; background: var(--blue); transition: width .3s; width: 0%; }
    .progress-bar.has-errors { background: var(--red); }

    /* ── Suite nav pills ── */
    .suite-nav { display: flex; gap: .5rem; flex-wrap: wrap; font-family: 'JetBrains Mono', monospace; font-size: .65rem; }
    .suite-pill {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); padding: .3rem .7rem; border-radius: 999px;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: .4rem;
    }
    .suite-pill:hover { border-color: var(--blue); color: var(--blue); }
    .pill-count { font-size: .58rem; }

    /* ── Suite card ── */
    .suite {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .suite-header {
      display: flex; align-items: center; gap: .75rem;
      padding: .85rem 1.25rem; background: var(--surface2);
      border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .suite-header:hover { background: var(--surface); }
    .suite-icon  { font-size: 1.1rem; }
    .suite-title { font-weight: 700; font-size: .9rem; }
    .suite-desc  { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--muted); }
    .suite-stats { margin-left: auto; display: flex; gap: .5rem; font-family: 'JetBrains Mono', monospace; font-size: .65rem; align-items: center; }
    .stat-ok   { color: var(--green); }
    .stat-err  { color: var(--red); }
    .stat-skip { color: var(--muted); }
    .suite-chevron { color: var(--muted); font-size: .7rem; margin-left: .5rem; transition: transform .2s; }
    .suite.collapsed .suite-chevron { transform: rotate(-90deg); }
    .suite.collapsed .test-list     { display: none; }
    .suite-run-btn {
      font-family: 'JetBrains Mono', monospace; font-size: .62rem;
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: .2rem .6rem; border-radius: 6px; cursor: pointer; transition: all .2s;
    }
    .suite-run-btn:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Test row ── */
    .test-list { display: flex; flex-direction: column; }
    .test-row {
      display: grid; grid-template-columns: 24px 1fr auto;
      align-items: start; gap: .75rem;
      padding: .7rem 1.25rem; border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .test-row:last-child  { border-bottom: none; }
    .test-row:hover       { background: var(--surface2); }
    .test-row.state-fail  { background: var(--err-bg) !important; border-left: 3px solid var(--red); }
    .test-row.state-ok    { border-left: 3px solid transparent; }

    .test-icon { font-size: .9rem; padding-top: 2px; }
    .test-body { display: flex; flex-direction: column; gap: .2rem; }
    .test-name { font-size: .82rem; font-weight: 600; }
    .test-desc { font-family: 'JetBrains Mono', monospace; font-size: .65rem; color: var(--muted); }

    /* Method badge */
    .method-badge {
      font-family: 'JetBrains Mono', monospace; font-size: .55rem; font-weight: 700;
      padding: .1rem .4rem; border-radius: 4px; letter-spacing: .05em;
    }
    .m-get    { background: rgba(34,197,94,.15);  color: var(--green); }
    .m-post   { background: rgba(251,191,36,.15); color: var(--yellow); }
    .m-put    { background: rgba(59,130,246,.15); color: var(--blue); }
    .m-patch  { background: rgba(168,85,247,.15); color: #c084fc; }
    .m-delete { background: rgba(239,68,68,.15);  color: var(--red); }

    /* ── Detail expandible ── */
    .test-detail {
      display: none; margin-top: .6rem;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .test-detail.visible { display: block; }

    .detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .detail-tab {
      font-family: 'JetBrains Mono', monospace; font-size: .6rem;
      padding: .3rem .75rem; cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent; transition: color .2s, border-color .2s;
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .detail-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    .detail-pane        { display: none; }
    .detail-pane.active { display: block; }

    .detail-response {
      padding: .6rem .85rem;
      font-family: 'JetBrains Mono', monospace; font-size: .63rem;
      color: var(--muted); max-height: 280px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all; line-height: 1.6;
    }
    /* JSON syntax colors — usan CSS vars para cambiar con el tema */
    .detail-response .json-key  { color: var(--json-key);  }
    .detail-response .json-str  { color: var(--json-str);  }
    .detail-response .json-num  { color: var(--json-num);  }
    .detail-response .json-bool { color: var(--json-bool); }
    .detail-response .json-null { color: var(--json-null); }

    .detail-info {
      padding: .5rem .85rem;
      font-family: 'JetBrains Mono', monospace; font-size: .63rem; color: var(--muted);
      display: flex; gap: 1.5rem; flex-wrap: wrap;
    }
    .detail-info span b { color: var(--text); }

    .error-hint {
      background: var(--err-bg); border-top: 1px solid var(--err-border);
      padding: .5rem .85rem;
      font-family: 'JetBrains Mono', monospace; font-size: .63rem;
      color: var(--red); line-height: 1.7;
    }
    .error-hint b { display: block; margin-bottom: .2rem; }

    /* ── Test meta ── */
    .test-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: .2rem;
      font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--muted);
      white-space: nowrap; padding-top: 2px;
    }
    .test-status-code      { font-weight: 600; }
    .test-status-code.ok   { color: var(--green); }
    .test-status-code.err  { color: var(--red); }
    .test-ms               { color: var(--muted); }
    .toggle-detail {
      background: none; border: none; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: .6rem;
      color: var(--blue); padding: 0;
    }
    .toggle-detail:hover { text-decoration: underline; }

    /* ── Spinner ── */
    .spin {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Resumen final ── */
    .summary {
      border-radius: 12px; padding: 1.1rem 1.5rem;
      border: 1px solid; display: none; align-items: center; gap: 1rem;
    }
    .summary.show  { display: flex; }
    .summary.pass  { background: rgba(34,197,94,.08);  border-color: rgba(34,197,94,.3);  color: var(--green); }
    .summary.fail  { background: rgba(239,68,68,.08);  border-color: rgba(239,68,68,.3);  color: var(--red); }
    .summary-detail { font-family: 'JetBrains Mono', monospace; font-size: .72rem; margin-left: auto; color: var(--muted); }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="page">

    <!-- ── Header ── -->
    <div class="header">
      <a class="back-btn" href="/">← Inicio</a>
      <div class="header-center">
        <h1>🧪 API Test Console</h1>
        <p>Solaris Platform · Pruebas de integración en tiempo real</p>
      </div>
      <div class="header-right">
        <div class="theme-switch">
          <span>☀️</span>
          <label class="toggle">
            <input type="checkbox" id="themeToggle" />
            <span class="track"></span><span class="thumb"></span>
          </label>
          <span>🌙</span>
        </div>
      </div>
    </div>

    <!-- ── Credenciales ── -->
    <div class="creds-bar">
      <div class="field">
        <label>Email</label>
        <input type="text" id="email" value="admin@solaris.local" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" value="Admin123!#" />
      </div>
      <div class="field" style="max-width:220px">
        <label>Base URL</label>
        <input type="text" id="baseUrl" value="http://localhost:5180" />
      </div>
    </div>

    <!-- ── JWT activo ── -->
    <div class="token-bar">
      <span class="token-label">JWT activo →</span>
      <span class="token-val empty" id="tokenDisplay">Sin token — ejecuta los tests primero</span>
    </div>

    <!-- ── Barra de progreso ── -->
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- ── Acciones ── -->
    <div class="actions">
      <button class="btn btn-primary"  id="btnRunAll"  onclick="TestUI.runAll()">▶ Ejecutar todos los tests</button>
      <button class="btn btn-danger"                   onclick="TestUI.clearAll()">✕ Limpiar</button>
      <button class="btn btn-outline"  id="btnDlAll"   onclick="TestReport.downloadAll()"   disabled>⬇ Resultados</button>
      <button class="btn btn-dl-fails" id="btnDlFails" onclick="TestReport.downloadFails()" disabled>⬇ Solo fallos</button>
    </div>

    <!-- ── Nav rápida por suite (generada por test.ui.js) ── -->
    <div class="suite-nav" id="suiteNav"></div>

    <!-- ── Resumen final ── -->
    <div class="summary" id="summary">
      <span id="summaryText">—</span>
      <span class="summary-detail" id="summaryDetail"></span>
    </div>

    <!-- ── Suites (generadas por test.ui.js) ── -->
    <div id="suitesContainer"></div>

  </div><!-- /page -->

  <!--
  ════════════════════════════════════════════════════════════════════
    SCRIPTS — orden de carga importante:
      1. test.config.js  → define TEST_SUITES (datos)
      2. test.runner.js  → motor de ejecución (depende de TEST_SUITES)
      3. test.report.js  → generador de reportes (depende de TestRunner)
      4. test.theme.js   → tema light/dark
      5. test.ui.js      → UI/DOM (depende de todos los anteriores)
  ════════════════════════════════════════════════════════════════════
  -->
  <script src="test/test.config.js"></script>
  <script src="test/test.runner.js"></script>
  <script src="test/test.report.js"></script>
  <script src="test/test.theme.js"></script>
  <script src="test/test.ui.js"></script>
  <script>
    // Inicializar al cargar la página
    document.addEventListener('DOMContentLoaded', () => {
      SolarisTheme.init('themeToggle');
      TestUI.init();
    });
  </script>

</body>
</html>
